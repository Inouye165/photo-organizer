services:
  postgres:
    image: postgres:16-alpine
    container_name: photo-organizer-postgres
    environment:
      POSTGRES_DB: photoorganizer
      POSTGRES_USER: photoorganizer
      POSTGRES_PASSWORD: photoorganizer
    ports:
      - "${PHOTO_ORGANIZER_POSTGRES_PORT:-5434}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoorganizer -d photoorganizer"]
      interval: 10s
      timeout: 5s
      retries: 5
